<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1280, height=720, initial-scale=1.0"/>
  <title>Perfect Alignment - Why This Works</title>
  
  <!-- CDN Links -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>

  <style>
    /* ===== BASE ===== */
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #0F172A;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      height: 100vh;
    }

    .slide-container {
      width: 1280px;
      height: 720px;
      position: relative;
      display: flex;
      flex-direction: column;
      background-image: url("https://page.gensparksite.com/slides_images/db6c9a5bcb5eac8a488d4d126f65f8df.webp");
      background-size: cover;
      background-position: center;
      margin: 0 auto;
    }

    /* ===== OVERLAY ===== */
    .overlay {
      position: absolute;
      inset: 0;
      background-color: rgba(15, 23, 42, 0.94);
      z-index: 1;
    }

    /* ===== CONTENT ===== */
    .content-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 50px 80px;
      box-sizing: border-box;
    }

    /* ===== HEADER ===== */
    .header {
      text-align: center;
      margin-bottom: 30px;
      animation: fadeInDown 0.8s ease-out 0.1s forwards;
      opacity: 0;
    }

    .subtitle {
      font-size: 16px;
      font-weight: 600;
      color: #38BDF8;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: block;
    }

    .main-title {
      font-family: 'Poppins', sans-serif;
      font-size: 48px;
      font-weight: 700;
      color: #ffffff;
      margin: 0;
      text-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    /* ===== ALIGNMENT CONTAINER ===== */
    .alignment-container {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
      position: relative;
      gap: 0;
    }

    /* ===== PARTNER CARDS ===== */
    .partner-card {
      width: 380px;
      height: 320px;
      background-color: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.4s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .partner-card:hover {
      transform: translateY(-5px);
      background-color: rgba(30, 41, 59, 0.8);
    }

    /* Chrysalis Card (Green) */
    .card-chrysalis {
      border-top: 4px solid #22C55E;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 0 20px rgba(34, 197, 94, 0.05);
      animation: slideInLeft 0.8s ease-out 0.2s forwards;
      opacity: 0;
    }

    .card-chrysalis:hover {
      box-shadow: 0 20px 40px rgba(34, 197, 94, 0.15);
      border-color: #22C55E;
    }

    .icon-circle-green {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: rgba(34, 197, 94, 0.1);
      color: #22C55E;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 20px;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    /* UEducate Card (Blue) */
    .card-ueducate {
      border-top: 4px solid #38BDF8;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 0 20px rgba(56, 189, 248, 0.05);
      animation: slideInRight 0.8s ease-out 0.2s forwards;
      opacity: 0;
    }

    .card-ueducate:hover {
      box-shadow: 0 20px 40px rgba(56, 189, 248, 0.15);
      border-color: #38BDF8;
    }

    .icon-circle-blue {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: rgba(56, 189, 248, 0.1);
      color: #38BDF8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 20px;
      border: 1px solid rgba(56, 189, 248, 0.2);
    }

    .card-name {
      font-weight: 600;
      font-size: 18px;
      color: #94A3B8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card-value {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 28px;
      color: #ffffff;
      margin: 0;
      text-align: center;
      line-height: 1.2;
    }

    /* ===== CONNECTOR ===== */
    .connector-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 140px;
      position: relative;
    }

    .connection-line {
      height: 2px;
      width: 50px;
      background-color: #64748B;
      position: relative;
      opacity: 0.5;
      animation: pulse-line 0.6s ease-out 0.6s forwards;
      opacity: 0;
      width: 0;
    }

    .connection-line.left {
      transform-origin: right;
    }

    .connection-line.right {
      transform-origin: left;
    }

    .plus-circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background-color: rgba(15, 23, 42, 0.9);
      border: 2px solid #FBBF24;
      color: #FBBF24;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 0 20px rgba(251, 191, 36, 0.3);
      z-index: 5;
      animation: scaleUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s forwards;
      opacity: 0;
    }

    /* ===== RESULT BOX ===== */
    .result-box-container {
      margin-top: 40px;
      width: 100%;
      display: flex;
      justify-content: center;
      animation: fadeInUp 0.8s ease-out 1.0s forwards;
      opacity: 0;
    }

    .result-box {
      background-color: rgba(30, 41, 59, 0.9);
      border: 1px solid rgba(56, 189, 248, 0.4);
      border-radius: 16px;
      padding: 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 0 30px rgba(56, 189, 248, 0.15);
      position: relative;
      overflow: hidden;
    }

    .result-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background-color: #38BDF8;
      box-shadow: 0 0 10px #38BDF8;
    }

    .result-text {
      font-family: 'Poppins', sans-serif;
      font-size: 24px;
      font-weight: 600;
      color: #E2E8F0;
      margin: 0;
      text-align: center;
    }

    .result-highlight {
      color: #38BDF8;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes scaleUp {
      from { opacity: 0; transform: scale(0); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes pulse-line {
      0% { opacity: 0.2; width: 0; }
      100% { opacity: 0.6; width: 50px; }
    }
  </style>
</head>

<body>
  <div class="slide-container">
    <div class="overlay"></div>
    
    <div class="content-wrapper">
      <!-- Header -->
      <div class="header">
        <p class="subtitle">Why This Works</p>
        <p class="main-title">Perfect Alignment</p>
      </div>

      <!-- Alignment Visual -->
      <div class="alignment-container">
        <!-- Left: Chrysalis -->
        <div class="partner-card card-chrysalis">
          <div class="icon-circle-green">
            <i class="fa-solid fa-school"></i>
          </div>
          <p class="card-name">Chrysalis</p>
          <p class="card-value">Strong School<br/>Network</p>
        </div>

        <!-- Center Connector -->
        <div class="connector-wrapper">
          <div class="connection-line left"></div>
          <div class="plus-circle">
            <i class="fa-solid fa-plus"></i>
          </div>
          <div class="connection-line right"></div>
        </div>

        <!-- Right: UEducate -->
        <div class="partner-card card-ueducate">
          <div class="icon-circle-blue">
            <i class="fa-solid fa-microchip"></i>
          </div>
          <p class="card-name">UEducate</p>
          <p class="card-value">Technology +<br/>Content</p>
        </div>
      </div>

      <!-- Bottom Result -->
      <div class="result-box-container">
        <div class="result-box">
          <p class="result-text">
            High Revenue with <span class="result-highlight">Minimal Operational Effort</span>
          </p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
