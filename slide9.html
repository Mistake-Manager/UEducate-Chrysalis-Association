<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1280, height=720, initial-scale=1.0"/>
  <title>Growth Projection</title>
  
  <!-- CDN Links -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>

  <style>
    /* ===== BASE ===== */
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #0F172A;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      height: 100vh;
    }

    .slide-container {
      width: 1280px;
      height: 720px;
      position: relative;
      display: flex;
      flex-direction: column;
      background-image: url("https://page.gensparksite.com/slides_images/db6c9a5bcb5eac8a488d4d126f65f8df.webp");
      background-size: cover;
      background-position: center;
      margin: 0 auto;
    }

    /* ===== OVERLAY ===== */
    .overlay {
      position: absolute;
      inset: 0;
      background-color: rgba(15, 23, 42, 0.94);
      z-index: 1;
    }

    /* ===== CONTENT ===== */
    .content-wrapper {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 40px 60px;
      box-sizing: border-box;
    }

    /* ===== HEADER ===== */
    .header {
      text-align: center;
      margin-bottom: 20px;
      animation: fadeInDown 0.8s ease-out 0.1s forwards;
      opacity: 0;
    }

    .title {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 48px;
      color: #ffffff;
      margin-bottom: 10px;
      text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    .subtitle {
      font-size: 18px;
      color: #94A3B8;
      letter-spacing: 1px;
      margin: 0;
    }

    /* ===== CHART CONTAINER ===== */
    .chart-container {
      display: flex;
      flex: 1;
      align-items: flex-end;
      justify-content: center;
      gap: 40px;
      padding-bottom: 40px;
      position: relative;
    }

    /* ===== GRID LINES ===== */
    .grid-lines {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 100% 60px;
      pointer-events: none;
      z-index: 2;
    }

    /* ===== BAR COLUMNS ===== */
    .bar-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      position: relative;
      width: 180px;
    }

    .bar {
      width: 100%;
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
      position: relative;
      transform-origin: bottom;
      animation: growBar 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 15px;
      overflow: hidden;
    }

    /* Glass effect for bars */
    .bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 20px;
      background-color: rgba(255,255,255,0.1);
      border-top: 1px solid rgba(255,255,255,0.3);
    }

    /* ===== BAR COLORS ===== */
    .bar-blue {
      background-color: rgba(56, 189, 248, 0.2);
      border: 1px solid rgba(56, 189, 248, 0.3);
      height: 120px;
    }

    .bar-blue-deep {
      background-color: rgba(56, 189, 248, 0.4);
      border: 1px solid rgba(56, 189, 248, 0.5);
      height: 180px;
    }

    .bar-green {
      background-color: rgba(34, 197, 94, 0.5);
      border: 1px solid rgba(34, 197, 94, 0.6);
      height: 240px;
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
    }

    .bar-gold {
      background-color: rgba(245, 158, 11, 0.6);
      border: 1px solid rgba(245, 158, 11, 0.7);
      height: 380px;
      box-shadow: 0 0 30px rgba(245, 158, 11, 0.3);
      position: relative;
    }

    /* ===== BAR CONTENT ===== */
    .bar-value {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 28px;
      color: #ffffff;
      position: absolute;
      top: -45px;
      text-align: center;
      width: 100%;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      animation: fadeInValue 0.5s ease-out forwards;
      opacity: 0;
    }

    .bar-value.large {
      font-size: 36px;
      color: #FBBF24;
      top: -55px;
    }

    .growth-arrow {
      color: #22C55E;
      font-size: 16px;
      margin-left: 5px;
      vertical-align: middle;
    }

    .bar-label {
      margin-top: 15px;
      font-weight: 500;
      font-size: 14px;
      color: #94A3B8;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .adoption-pill {
      background-color: rgba(15, 23, 42, 0.8);
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      display: inline-block;
    }

    /* ===== STAR EFFECT ===== */
    .star-icon {
      color: #FBBF24;
      font-size: 24px;
      position: absolute;
      top: -85px;
      animation: spin-pulse 3s infinite linear;
      filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.8));
    }

    /* ===== CAPTION ===== */
    .caption-container {
      text-align: center;
      margin-top: auto;
      background-color: rgba(34, 197, 94, 0.05);
      border: 1px solid rgba(34, 197, 94, 0.2);
      border-radius: 50px;
      padding: 12px 30px;
      align-self: center;
      animation: fadeInUp 1s ease-out 1s forwards;
      opacity: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .caption-text {
      font-family: 'Poppins', sans-serif;
      font-size: 20px;
      color: #E2E8F0;
      margin: 0;
    }

    .caption-highlight {
      color: #4ADE80;
      font-weight: 600;
    }

    /* ===== ICONS INSIDE BARS ===== */
    .bar-icon {
      color: rgba(255,255,255,0.2);
      font-size: 40px;
      margin-top: 20px;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInValue {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes growBar {
      from { height: 0; opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes spin-pulse {
      0% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.2) rotate(180deg); }
      100% { transform: scale(1) rotate(360deg); }
    }

    /* ===== ANIMATION DELAYS ===== */
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .val-delay-1 { animation: fadeInValue 0.5s ease-out 0.8s forwards; opacity: 0; }
    .val-delay-2 { animation: fadeInValue 0.5s ease-out 1.0s forwards; opacity: 0; }
    .val-delay-3 { animation: fadeInValue 0.5s ease-out 1.2s forwards; opacity: 0; }
    .val-delay-4 { animation: fadeInValue 0.5s ease-out 1.4s forwards; opacity: 0; }
  </style>
</head>

<body>
  <div class="slide-container">
    <div class="overlay"></div>
    
    <div class="content-wrapper">
      <!-- Header -->
      <div class="header">
        <p class="title">Scalable Growth Model</p>
        <p class="subtitle">Adoption-based revenue expansion projections</p>
      </div>

      <!-- Chart Area -->
      <div class="chart-container">
        <div class="grid-lines"></div>

        <!-- Bar 1: 25% -->
        <div class="bar-column">
          <p class="bar-value val-delay-1">₹7.5 Cr<i class="fa-solid fa-arrow-trend-up growth-arrow"></i></p>
          <div class="bar bar-blue delay-1">
            <i class="fa-solid fa-chart-pie bar-icon"></i>
          </div>
          <div class="bar-label">
            <span class="adoption-pill">25% Adoption</span>
          </div>
        </div>

        <!-- Bar 2: 50% -->
        <div class="bar-column">
          <p class="bar-value val-delay-2">₹15 Cr<i class="fa-solid fa-arrow-trend-up growth-arrow"></i></p>
          <div class="bar bar-blue-deep delay-2">
            <i class="fa-solid fa-chart-pie bar-icon"></i>
          </div>
          <div class="bar-label">
            <span class="adoption-pill">50% Adoption</span>
          </div>
        </div>

        <!-- Bar 3: 100% -->
        <div class="bar-column">
          <p class="bar-value val-delay-3" style="color: #4ADE80;">₹30 Cr<i class="fa-solid fa-arrow-trend-up growth-arrow"></i></p>
          <div class="bar bar-green delay-3">
            <i class="fa-solid fa-check-circle bar-icon"></i>
          </div>
          <div class="bar-label">
            <span class="adoption-pill" style="border-color: #4ADE80; color: #4ADE80;">100% Adoption</span>
          </div>
        </div>

        <!-- Bar 4: Premium -->
        <div class="bar-column">
          <i class="fa-solid fa-star star-icon val-delay-4"></i>
          <p class="bar-value large val-delay-4">₹360 Cr</p>
          <div class="bar bar-gold delay-4">
            <i class="fa-solid fa-crown bar-icon" style="color: rgba(251, 191, 36, 0.4);"></i>
          </div>
          <div class="bar-label">
            <span class="adoption-pill" style="border-color: #FBBF24; color: #FBBF24; background-color: rgba(251, 191, 36, 0.1);">Premium Model</span>
          </div>
        </div>
      </div>

      <!-- Caption -->
      <div class="caption-container">
        <i class="fa-solid fa-rocket caption-highlight" style="font-size: 24px;"></i>
        <p class="caption-text">
          This is not just revenue — this is a <span class="caption-highlight">scalable growth engine</span>.
        </p>
      </div>
    </div>
  </div>
</body>
</html>
