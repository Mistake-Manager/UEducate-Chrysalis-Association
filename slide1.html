<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1280, height=720, initial-scale=1.0" />
  <title>UEducate x Chrysalis Association Title Slide</title>

  <!-- Stylesheets -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet" />

  <style>
    /* ===== BASE ===== */
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #0F172A;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
    }

    .slide-container {
      width: 1280px;
      height: 720px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;

      background-image: url("https://page.gensparksite.com/slides_images/db6c9a5bcb5eac8a488d4d126f65f8df.webp");
      background-size: cover;
      background-position: center;
    }

    /* ===== OVERLAY ===== */
    .overlay {
      position: absolute;
      inset: 0;
      background-color: rgba(15, 23, 42, 0.9);
      z-index: 1;
    }

    /* ===== GRID ===== */
    .grid-lines {
      position: absolute;
      inset: 0;
      z-index: 1;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
    }

    /* ===== CONTENT ===== */
    .content-wrapper {
      z-index: 10;
      text-align: center;
      max-width: 1000px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    /* ===== TYPOGRAPHY ===== */
    .main-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 900;
      font-size: 84px;
      line-height: 1.1;
      margin-bottom: 24px;
      letter-spacing: -2px;
      text-shadow: 0 0 40px rgba(56, 189, 248, 0.6);
    }

    .highlight-blue {
      color: #38BDF8;
    }

    .subtitle {
      font-size: 32px;
      color: #E2E8F0;
      margin-bottom: 48px;
      border-bottom: 2px solid #38BDF8;
      padding-bottom: 10px;
    }

    /* ===== TAGLINE ===== */
    .tagline-container {
      background-color: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 50px;
      padding: 16px 40px;
      backdrop-filter: blur(10px);
      animation: pulse-glow 3s infinite ease-in-out;
    }

    .tagline-text {
      font-family: 'Poppins';
      font-size: 24px;
      color: #38BDF8;
    }

    .tagline-highlight {
      color: #22C55E;
      font-weight: 700;
    }

    /* ===== LOGO ===== */
    .logo-placeholder {
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo-box {
      background: rgba(255, 255, 255, 0.1);
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    /* ===== PARTICLES ===== */
    .particle {
      position: absolute;
      background-color: #38BDF8;
      border-radius: 50%;
      opacity: 0.4;
      z-index: 2;
    }

    .p1 { top: 20%; left: 15%; width: 8px; height: 8px; animation: float 6s infinite; }
    .p2 { top: 70%; left: 85%; width: 12px; height: 12px; animation: float 8s infinite; }
    .p3 { top: 40%; left: 90%; width: 5px; height: 5px; animation: float 5s infinite; }

    /* ===== ANIMATIONS ===== */
    @keyframes pulse-glow {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-1 { animation: fadeInUp 0.8s forwards; }
    .animate-2 { animation: fadeInUp 0.8s 0.3s forwards; opacity: 0; }
    .animate-3 { animation: fadeInUp 0.8s 0.6s forwards; opacity: 0; }
  </style>
</head>

<body>

  <div class="slide-container">

    <!-- Background -->
    <div class="overlay"></div>
    <div class="grid-lines"></div>

    <!-- Particles -->
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>

    <!-- Content -->
    <div class="content-wrapper">

      <div class="logo-placeholder animate-1">
        <div class="logo-box">UEDUCATE</div>
        <div style="font-size: 24px; color: #38BDF8;">×</div>
        <div class="logo-box">CHRYSALIS</div>
      </div>

      <div class="animate-1">
        <h1 class="main-title">
          UEducate <span class="highlight-blue">×</span><br>
          Chrysalis Association
        </h1>
      </div>

      <div class="animate-2">
        <p class="subtitle">
          Transforming Education into Scalable Revenue
        </p>
      </div>

      <div class="animate-3">
        <div class="tagline-container">
          <p class="tagline-text">
            Unlocking <span class="tagline-highlight">₹30+ Crore Opportunity</span> Across 2000 Schools
          </p>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
