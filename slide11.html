<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1280, height=720, initial-scale=1.0"/>
  <title>Pilot Plan - Execution Strategy</title>
  
  <!-- CDN Links -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>

  <style>
    /* ===== BASE ===== */
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #0F172A;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      height: 100vh;
    }

    .slide-container {
      width: 1280px;
      height: 720px;
      position: relative;
      display: flex;
      flex-direction: column;
      background-image: url("https://page.gensparksite.com/slides_images/db6c9a5bcb5eac8a488d4d126f65f8df.webp");
      background-size: cover;
      background-position: center;
      margin: 0 auto;
    }

    /* ===== OVERLAY ===== */
    .overlay {
      position: absolute;
      inset: 0;
      background-color: rgba(15, 23, 42, 0.94);
      z-index: 1;
    }

    /* ===== CONTENT ===== */
    .content-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 50px 60px;
      box-sizing: border-box;
    }

    /* ===== HEADER ===== */
    .header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeInDown 0.8s ease-out 0.1s forwards;
      opacity: 0;
    }

    .subtitle {
      font-size: 16px;
      font-weight: 600;
      color: #38BDF8;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: block;
    }

    .main-title {
      font-family: 'Poppins', sans-serif;
      font-size: 48px;
      font-weight: 700;
      color: #ffffff;
      margin: 0;
      text-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    /* ===== TIMELINE CONTAINER ===== */
    .timeline-container {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 20px;
      width: 100%;
      margin-bottom: 20px;
    }

    /* ===== STEP CARDS ===== */
    .step-card {
      width: 320px;
      height: 380px;
      background-color: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 30px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .step-card:hover {
      transform: translateY(-10px);
      background-color: rgba(30, 41, 59, 0.8);
    }

    /* Step Number Watermark */
    .step-number {
      position: absolute;
      top: 10px;
      right: 20px;
      font-family: 'Poppins', sans-serif;
      font-size: 80px;
      font-weight: 900;
      color: rgba(255, 255, 255, 0.03);
      line-height: 1;
      z-index: 0;
    }

    /* ===== ICONS ===== */
    .icon-wrapper {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin-bottom: 25px;
      z-index: 1;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    /* Step 1 - Blue */
    .step-1 {
      border-top: 4px solid #38BDF8;
      animation: slideInLeft 0.8s ease-out 0.2s forwards;
      opacity: 0;
    }

    .step-1:hover {
      box-shadow: 0 15px 30px rgba(56, 189, 248, 0.15);
      border-color: #38BDF8;
    }

    .icon-1 {
      background-color: rgba(56, 189, 248, 0.1);
      color: #38BDF8;
      border-color: rgba(56, 189, 248, 0.3);
    }

    /* Step 2 - Green */
    .step-2 {
      border-top: 4px solid #22C55E;
      animation: slideInUp 0.8s ease-out 0.4s forwards;
      opacity: 0;
    }

    .step-2:hover {
      box-shadow: 0 15px 30px rgba(34, 197, 94, 0.15);
      border-color: #22C55E;
    }

    .icon-2 {
      background-color: rgba(34, 197, 94, 0.1);
      color: #22C55E;
      border-color: rgba(34, 197, 94, 0.3);
    }

    /* Step 3 - Gold */
    .step-3 {
      border-top: 4px solid #FBBF24;
      animation: slideInRight 0.8s ease-out 0.6s forwards;
      opacity: 0;
    }

    .step-3:hover {
      box-shadow: 0 15px 30px rgba(251, 191, 36, 0.15);
      border-color: #FBBF24;
    }

    .icon-3 {
      background-color: rgba(251, 191, 36, 0.1);
      color: #FBBF24;
      border-color: rgba(251, 191, 36, 0.3);
    }

    /* ===== TEXT CONTENT ===== */
    .step-title {
      font-family: 'Poppins', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 10px;
      text-align: center;
      z-index: 1;
    }

    .step-desc {
      font-size: 16px;
      color: #94A3B8;
      text-align: center;
      line-height: 1.5;
      z-index: 1;
    }

    /* ===== CONNECTORS ===== */
    .connector {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #475569;
      font-size: 24px;
      width: 40px;
      animation: pulse-arrow 2s infinite 0.8s;
    }

    /* ===== HIGHLIGHT BOX ===== */
    .highlight-box {
      background-color: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 50px;
      padding: 15px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.1);
      align-self: center;
      animation: fadeInUp 0.8s ease-out 1.0s forwards;
      opacity: 0;
    }

    .highlight-icon {
      color: #38BDF8;
      font-size: 20px;
    }

    .highlight-text {
      font-family: 'Poppins', sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: #E0F2FE;
      margin: 0;
      letter-spacing: 0.5px;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse-arrow {
      0% { transform: translateX(0); opacity: 0.4; }
      50% { transform: translateX(5px); opacity: 0.8; }
      100% { transform: translateX(0); opacity: 0.4; }
    }
  </style>
</head>

<body>
  <div class="slide-container">
    <div class="overlay"></div>
    
    <div class="content-wrapper">
      <!-- Header -->
      <div class="header">
        <p class="subtitle">Pilot Plan</p>
        <p class="main-title">Execution Strategy</p>
      </div>

      <!-- Timeline -->
      <div class="timeline-container">
        <!-- Step 1 -->
        <div class="step-card step-1">
          <p class="step-number">01</p>
          <div class="icon-wrapper icon-1">
            <i class="fas fa-rocket"></i>
          </div>
          <p class="step-title">Initial Launch</p>
          <p class="step-desc">Start with 50–100 Schools to establish baseline metrics</p>
        </div>

        <!-- Arrow 1 -->
        <div class="connector">
          <i class="fas fa-chevron-right"></i>
        </div>

        <!-- Step 2 -->
        <div class="step-card step-2">
          <p class="step-number">02</p>
          <div class="icon-wrapper icon-2">
            <i class="fas fa-check-circle"></i>
          </div>
          <p class="step-title">Validate Results</p>
          <p class="step-desc">Measure learning outcomes and gather user feedback</p>
        </div>

        <!-- Arrow 2 -->
        <div class="connector">
          <i class="fas fa-chevron-right"></i>
        </div>

        <!-- Step 3 -->
        <div class="step-card step-3">
          <p class="step-number">03</p>
          <div class="icon-wrapper icon-3">
            <i class="fas fa-chart-line"></i>
          </div>
          <p class="step-title">Scale Up</p>
          <p class="step-desc">Expand to full network of 2000 schools</p>
        </div>
      </div>

      <!-- Bottom Highlight -->
      <div class="highlight-box">
        <i class="fas fa-bolt highlight-icon"></i>
        <p class="highlight-text">Fast rollout with measurable results</p>
      </div>
    </div>
  </div>
</body>
</html>
