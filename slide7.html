<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1280, height=720, initial-scale=1.0"/>
  <title>Revenue Calculation - Slide 7</title>
  
  <!-- CDN Links -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>

  <style>
    /* ===== BASE ===== */
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #0F172A;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      height: 100vh;
    }

    .slide-container {
      width: 1280px;
      height: 720px;
      position: relative;
      display: flex;
      flex-direction: column;
      background-image: url("https://page.gensparksite.com/slides_images/db6c9a5bcb5eac8a488d4d126f65f8df.webp");
      background-size: cover;
      background-position: center;
      margin: 0 auto;
    }

    /* ===== OVERLAY & GRID ===== */
    .overlay {
      position: absolute;
      inset: 0;
      background-color: rgba(15, 23, 42, 0.94);
      z-index: 1;
    }

    .grid-lines {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), 
                        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 2;
      pointer-events: none;
    }

    /* ===== CONTENT ===== */
    .content-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 50px;
      box-sizing: border-box;
    }

    /* ===== HEADER ===== */
    .header-section {
      text-align: center;
      margin-bottom: 50px;
      animation: fadeInDown 0.8s ease-out 0.2s forwards;
      opacity: 0;
    }

    .slide-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 48px;
      color: #ffffff;
      margin: 0;
      text-shadow: 0 4px 10px rgba(0,0,0,0.5);
      line-height: 1.2;
    }

    .highlight-blue {
      color: #38BDF8;
    }

    /* ===== FORMULA ROW ===== */
    .formula-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin-bottom: 10px;
    }

    /* ===== INPUT CARDS ===== */
    .input-card {
      background-color: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 240px;
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .input-card:hover {
      transform: translateY(-5px);
      border-color: rgba(56, 189, 248, 0.3);
    }

    .input-value {
      font-family: 'Poppins', sans-serif;
      font-size: 42px;
      font-weight: 700;
      color: #E2E8F0;
      line-height: 1;
      margin-bottom: 8px;
    }

    .input-label {
      font-size: 14px;
      color: #94A3B8;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 500;
      margin: 0;
    }

    /* ===== OPERATORS ===== */
    .operator {
      font-family: 'Poppins', sans-serif;
      font-size: 42px;
      color: #64748B;
      font-weight: 300;
      padding: 0 10px;
    }

    /* ===== EQUALS DIVIDER ===== */
    .equals-divider {
      margin: 20px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .equals-icon {
      font-size: 32px;
      color: #64748B;
      animation: bounce 2s infinite;
    }

    /* ===== RESULT CONTAINER ===== */
    .result-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
      margin-bottom: 40px;
    }

    .result-text {
      font-family: 'Poppins', sans-serif;
      font-size: 140px;
      font-weight: 900;
      color: #22C55E;
      line-height: 1;
      display: flex;
      align-items: center;
      gap: 20px;
      text-shadow: 0 0 60px rgba(34, 197, 94, 0.3), 0 0 20px rgba(34, 197, 94, 0.5);
      animation: glow-pulse 3s infinite alternate;
    }

    .trend-arrow {
      font-size: 90px;
      color: #22C55E;
      margin-left: 20px;
      filter: drop-shadow(0 0 15px rgba(34, 197, 94, 0.4));
      animation: float-arrow 2s ease-in-out infinite alternate;
    }

    /* ===== SUBTEXT PILL ===== */
    .subtext-pill {
      background-color: rgba(6, 78, 59, 0.4);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 50px;
      padding: 12px 36px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: auto;
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.1);
    }

    .subtext-icon {
      color: #22C55E;
      font-size: 18px;
    }

    .subtext-content {
      font-size: 18px;
      color: #86EFAC;
      font-weight: 500;
      margin: 0;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes glow-pulse {
      0% { 
        text-shadow: 0 0 40px rgba(34, 197, 94, 0.2); 
        transform: scale(1); 
      }
      100% { 
        text-shadow: 0 0 80px rgba(34, 197, 94, 0.4); 
        transform: scale(1.02); 
      }
    }

    @keyframes float-arrow {
      0% { transform: translate(0, 0); }
      100% { transform: translate(5px, -10px); }
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-10px); }
      60% { transform: translateY(-5px); }
    }

    /* ===== ANIMATION DELAYS ===== */
    .delay-1 { animation: fadeInDown 0.8s ease-out 0.2s forwards; opacity: 0; }
    .delay-2 { animation: fadeInUp 0.8s ease-out 0.5s forwards; opacity: 0; }
    .delay-3 { animation: fadeInUp 0.8s ease-out 0.8s forwards; opacity: 0; }
    .delay-4 { animation: fadeInUp 0.8s ease-out 1.1s forwards; opacity: 0; }

    /* ===== SLIDE NUMBER ===== */
    .slide-number {
      position: absolute;
      bottom: 30px;
      right: 40px;
      font-size: 14px;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>

<body>
  <div class="slide-container">
    <div class="overlay"></div>
    <div class="grid-lines"></div>
    
    <div class="content-wrapper">
      <!-- Header -->
      <div class="header-section delay-1">
        <p class="slide-title">
          <span class="highlight-blue">₹30 Crore</span> Already in Your Network
        </p>
      </div>

      <!-- Formula Row -->
      <div class="formula-row delay-2">
        <!-- Students -->
        <div class="input-card">
          <p class="input-value">6,00,000</p>
          <p class="input-label">
            <i class="fas fa-users" style="margin-right:8px; color:#38BDF8;"></i>
            Students
          </p>
        </div>

        <!-- Operator -->
        <div class="operator">
          <i class="fas fa-xmark"></i>
        </div>

        <!-- Price Per Student -->
        <div class="input-card">
          <p class="input-value">₹500</p>
          <p class="input-label">
            <i class="fas fa-tag" style="margin-right:8px; color:#A855F7;"></i>
            Per Student
          </p>
        </div>
      </div>

      <!-- Equals Divider -->
      <div class="equals-divider delay-3">
        <i class="fas fa-equals equals-icon"></i>
      </div>

      <!-- Massive Result -->
      <div class="result-container delay-3">
        <div class="result-text">
          ₹30 CRORE
          <i class="fas fa-arrow-trend-up trend-arrow"></i>
        </div>
      </div>

      <!-- Footer Message -->
      <div class="subtext-pill delay-4">
        <i class="fas fa-circle-check subtext-icon"></i>
        <p class="subtext-content">No expansion required — based on your current reach</p>
      </div>
    </div>

    <div class="slide-number">07 / 12</div>
  </div>
</body>
</html>
