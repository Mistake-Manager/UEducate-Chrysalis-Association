<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1280, height=720, initial-scale=1.0"/>
  <title>Revenue Split - Slide 8</title>
  
  <!-- CDN Links -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

  <style>
    /* ===== BASE ===== */
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #0F172A;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      height: 100vh;
    }

    .slide-container {
      width: 1280px;
      height: 720px;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background-image: url("https://page.gensparksite.com/slides_images/db6c9a5bcb5eac8a488d4d126f65f8df.webp");
      background-size: cover;
      background-position: center;
      margin: 0 auto;
    }

    /* ===== OVERLAY ===== */
    .overlay {
      position: absolute;
      inset: 0;
      background-color: rgba(15, 23, 42, 0.94);
      z-index: 1;
    }

    /* ===== CONTENT ===== */
    .content-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      padding: 40px 60px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-sizing: border-box;
    }

    /* ===== HEADER ===== */
    .header-section {
      text-align: center;
      margin-bottom: 10px;
      animation: fadeInDown 0.8s ease-out 0.1s forwards;
      opacity: 0;
    }

    .slide-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 32px;
      color: #94A3B8;
      margin: 0;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .total-revenue-container {
      margin-top: 10px;
      display: inline-block;
      background-color: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 10px 40px;
      border-radius: 50px;
      box-shadow: 0 0 30px rgba(56, 189, 248, 0.1);
      backdrop-filter: blur(5px);
    }

    .total-revenue-label {
      font-size: 16px;
      color: #E2E8F0;
      margin-right: 10px;
    }

    .total-revenue-amount {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 48px;
      color: #ffffff;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      line-height: 1;
    }

    /* ===== SPLIT GRID ===== */
    .split-grid {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex: 1;
      padding: 0 20px;
      gap: 20px;
    }

    /* ===== CHART CONTAINER ===== */
    .chart-container {
      width: 450px;
      height: 400px;
      position: relative;
      animation: zoomIn 0.8s ease-out 0.5s backwards;
      opacity: 0;
    }

    #revenueChart {
      width: 100%;
      height: 100%;
    }

    /* ===== REVENUE CARDS ===== */
    .revenue-card {
      width: 320px;
      padding: 30px 25px;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      backdrop-filter: blur(12px);
      transition: all 0.4s ease;
      background-color: rgba(30, 41, 59, 0.7);
    }

    .revenue-card:hover {
      transform: translateY(-10px);
    }

    /* Chrysalis Card (Green) */
    .card-chrysalis {
      border: 2px solid rgba(34, 197, 94, 0.3);
      box-shadow: 0 10px 40px -10px rgba(34, 197, 94, 0.2);
      animation: slideInLeft 0.8s ease-out 0.3s backwards;
      opacity: 0;
    }

    .card-chrysalis:hover {
      box-shadow: 0 20px 50px -10px rgba(34, 197, 94, 0.4);
      border-color: rgba(34, 197, 94, 0.8);
    }

    .text-green-glow {
      color: #22C55E;
      text-shadow: 0 0 15px rgba(34, 197, 94, 0.5);
    }

    .bg-green-soft {
      background-color: rgba(34, 197, 94, 0.1);
      color: #22C55E;
    }

    /* UEducate Card (Blue) */
    .card-ueducate {
      border: 2px solid rgba(56, 189, 248, 0.3);
      box-shadow: 0 10px 40px -10px rgba(56, 189, 248, 0.2);
      animation: slideInRight 0.8s ease-out 0.7s backwards;
      opacity: 0;
    }

    .card-ueducate:hover {
      box-shadow: 0 20px 50px -10px rgba(56, 189, 248, 0.4);
      border-color: rgba(56, 189, 248, 0.8);
    }

    .text-blue-glow {
      color: #38BDF8;
      text-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
    }

    .bg-blue-soft {
      background-color: rgba(56, 189, 248, 0.1);
      color: #38BDF8;
    }

    /* Card Elements */
    .card-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 20px;
      border: 1px solid currentColor;
    }

    .card-label {
      font-size: 16px;
      font-weight: 500;
      color: #E2E8F0;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .share-percent {
      font-size: 14px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 12px;
      margin-bottom: 15px;
      display: inline-block;
    }

    .revenue-amount {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 42px;
      line-height: 1;
      margin: 10px 0;
    }

    /* ===== FOOTER HIGHLIGHT ===== */
    .footer-highlight {
      margin-top: auto;
      align-self: center;
      background-color: rgba(34, 197, 94, 0.1);
      border-left: 4px solid #22C55E;
      padding: 15px 30px;
      border-radius: 0 8px 8px 0;
      display: flex;
      align-items: center;
      max-width: 800px;
      animation: slideInUp 0.8s ease-out 1s backwards;
      opacity: 0;
    }

    .footer-icon {
      color: #22C55E;
      font-size: 24px;
      margin-right: 20px;
    }

    .footer-text {
      color: #F0FDF4;
      font-family: 'Poppins', sans-serif;
      font-size: 20px;
      font-weight: 500;
      margin: 0;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>

<body>
  <div class="slide-container">
    <div class="overlay"></div>
    
    <div class="content-wrapper">
      <!-- Header -->
      <div class="header-section">
        <p class="slide-title">Revenue Split</p>
        <div class="total-revenue-container">
          <span class="total-revenue-label">Total Annual Revenue Opportunity:</span>
          <span class="total-revenue-amount">₹30 CRORE</span>
        </div>
      </div>

      <!-- Main Content: Cards & Chart -->
      <div class="split-grid">
        <!-- Chrysalis Card (Left) -->
        <div class="revenue-card card-chrysalis">
          <div class="card-icon bg-green-soft">
            <i class="fas fa-hand-holding-dollar"></i>
          </div>
          <p class="card-label">Chrysalis Share</p>
          <span class="share-percent bg-green-soft">30% SHARE</span>
          <p class="revenue-amount text-green-glow">₹9 CRORE</p>
          <p style="font-size: 13px; color: #86EFAC; margin-top: 5px;">Pure Profit / No Tech Cost</p>
        </div>

        <!-- Center Chart -->
        <div class="chart-container">
          <div id="revenueChart"></div>
        </div>

        <!-- UEducate Card (Right) -->
        <div class="revenue-card card-ueducate">
          <div class="card-icon bg-blue-soft">
            <i class="fas fa-server"></i>
          </div>
          <p class="card-label">UEducate Share</p>
          <span class="share-percent bg-blue-soft">70% SHARE</span>
          <p class="revenue-amount text-blue-glow">₹21 CRORE</p>
          <p style="font-size: 13px; color: #93C5FD; margin-top: 5px;">Technology & Operations</p>
        </div>
      </div>

      <!-- Footer Highlight -->
      <div class="footer-highlight">
        <i class="fas fa-check-circle footer-icon"></i>
        <p class="footer-text">₹9 Crore comes without any technology investment from your side</p>
      </div>
    </div>
  </div>

  <!-- ECharts Initialization -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var chartDom = document.getElementById('revenueChart');
      var myChart = echarts.init(chartDom);
      
      var option = {
        tooltip: {
          trigger: 'item',
          backgroundColor: 'rgba(15, 23, 42, 0.9)',
          borderColor: '#38BDF8',
          textStyle: {
            color: '#fff',
            fontFamily: 'Inter'
          }
        },
        series: [{
          name: 'Revenue Split',
          type: 'pie',
          radius: ['55%', '85%'],
          center: ['50%', '50%'],
          avoidLabelOverlap: false,
          itemStyle: {
            borderRadius: 10,
            borderColor: '#0F172A',
            borderWidth: 8,
            shadowBlur: 20,
            shadowColor: 'rgba(0, 0, 0, 0.5)'
          },
          label: {
            show: false,
            position: 'center'
          },
          emphasis: {
            scale: true,
            scaleSize: 10,
            label: {
              show: true,
              fontSize: 24,
              fontWeight: 'bold',
              color: '#fff',
              fontFamily: 'Poppins',
              formatter: '{d}%\n{b}'
            },
            itemStyle: {
              shadowBlur: 30,
              shadowColor: 'rgba(0, 0, 0, 0.8)'
            }
          },
          labelLine: {
            show: false
          },
          data: [
            {
              value: 30,
              name: 'Chrysalis',
              itemStyle: {
                color: {
                  type: 'linear',
                  x: 0, y: 0, x2: 0, y2: 1,
                  colorStops: [{
                    offset: 0, color: '#4ADE80'
                  }, {
                    offset: 1, color: '#166534'
                  }]
                },
                shadowColor: 'rgba(34, 197, 94, 0.5)',
                shadowBlur: 20
              }
            },
            {
              value: 70,
              name: 'UEducate',
              itemStyle: {
                color: {
                  type: 'linear',
                  x: 0, y: 0, x2: 0, y2: 1,
                  colorStops: [{
                    offset: 0, color: '#38BDF8'
                  }, {
                    offset: 1, color: '#0369A1'
                  }]
                },
                shadowColor: 'rgba(56, 189, 248, 0.5)',
                shadowBlur: 20
              }
            }
          ]
        }]
      };
      
      myChart.setOption(option);
      
      // Auto highlight Chrysalis slice
      setTimeout(function() {
        myChart.dispatchAction({
          type: 'highlight',
          seriesIndex: 0,
          dataIndex: 0
        });
        myChart.dispatchAction({
          type: 'showTip',
          seriesIndex: 0,
          dataIndex: 0
        });
      }, 1500);
    });
  </script>
</body>
</html>
